    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SewaBot — Find a Worker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="../css/main.css"/>
    <link rel="stylesheet" href="../css/client.css"/>
    </head>
    <body>

    <!-- Topbar -->
    <div class="topbar">
    <div class="logo">Sewa<span>Bot</span></div>
    <div class="flex gap-12" style="align-items:center;">
        <span class="text-sm muted">👋 <span id="user-name"></span></span>
        <div class="status-dot"></div>
        <button class="btn btn-secondary" style="padding:8px 14px;font-size:13px;"
                onclick="logout()">Sign out</button>
    </div>
    </div>

    <!-- Main -->
    <div class="client-page">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-scroll">

        <!-- Location -->
        <div class="sidebar-section">
            <div class="section-label">Your Location</div>
            <div class="location-bar" onclick="detectGPS()">
            <div class="location-dot"></div>
            <div class="location-text">
                <div class="lbl">Current location</div>
                <div class="val" id="location-display">Kathmandu, Nepal</div>
            </div>
            <button class="gps-btn" onclick="event.stopPropagation(); detectGPS()">📡 GPS</button>
            </div>

            <div class="flex gap-8">
            <div class="form-group" style="flex:1;margin:0;">
                <label class="form-label">Lat</label>
                <input class="input" id="lat-input" type="number" value="27.7172"
                    step="0.0001" style="padding:8px 10px;font-size:13px;"
                    onchange="onCoordChange()"/>
            </div>
            <div class="form-group" style="flex:1;margin:0;">
                <label class="form-label">Lng</label>
                <input class="input" id="lng-input" type="number" value="85.3240"
                    step="0.0001" style="padding:8px 10px;font-size:13px;"
                    onchange="onCoordChange()"/>
            </div>
            </div>
            <p class="text-xs muted mt-8">💡 Click map or drag pin to change location</p>
        </div>

        <div class="divider"></div>

        <!-- Job input -->
        <div class="sidebar-section">
            <div class="section-label">Describe Your Problem</div>

            <div class="chips">
            <div class="chip" onclick="setChip('My pipe is leaking badly, water everywhere')">🚰 Pipe leak</div>
            <div class="chip" onclick="setChip('Lights stopped working suddenly')">💡 Electrical</div>
            <div class="chip" onclick="setChip('Need to fix a broken door')">🚪 Carpenter</div>
            <div class="chip" onclick="setChip('AC not cooling properly')">❄️ AC repair</div>
            <div class="chip" onclick="setChip('Need deep cleaning service')">🧹 Cleaning</div>
            <div class="chip" onclick="setChip('Need wall painting done')">🎨 Painting</div>
            </div>

            <div class="textarea-wrap">
            <textarea class="input" id="job-desc"
                placeholder="e.g. My kitchen pipe is leaking badly..."
                maxlength="300"
                rows="5"
                style="resize:none;padding-bottom:32px;"
                oninput="updateCharCount()"></textarea>
            <span class="char-count" id="char-count">0/300</span>
            </div>

            <div class="validation hidden" id="validation-msg"></div>

            <button class="btn btn-primary btn-full" id="find-btn" onclick="findWorkers()">
            🔍 Find Workers
            </button>
        </div>

        <div class="divider"></div>

        <!-- Results -->
        <div id="results-area">
            <div class="empty-state">
            <div class="icon">🗺️</div>
            <p>Describe your problem above and we'll find the best available worker near you.</p>
            </div>
        </div>

        </div>
    </div>

    <!-- Map -->
    <div class="map-container">
        <div id="map"></div>
    </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/map.js"></script>
    <script src="../js/websocket.js"></script>
    <script src="../js/payment.js"></script>
    <script src="../js/client.js"></script>
    </body>
    </html>
